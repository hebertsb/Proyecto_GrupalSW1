name: sivic_mobile
description: SIVIC — App de Guardia para sistema de vigilancia inteligente

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Navegación
  go_router: ^13.2.0
  # HTTP
  dio: ^5.4.3+1
  # Estado
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  # Almacenamiento local
  shared_preferences: ^2.2.3
  # Notificaciones push
  firebase_core: ^2.31.1
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.1.2
  # Video/stream
  video_player: ^2.8.6
  # Íconos + fuente
  google_fonts: ^6.2.1
  # JWT decode
  dart_jsonwebtoken: ^2.8.3
  # Formateo fechas
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/imagenes/
