<div class="login-pagina">
  <div class="login-tarjeta">
    <div class="login-tarjeta__logo">
      <span class="material-icons">security</span>
      <h1>SIVIC</h1>
      <p>Sistema de Visión Inteligente</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="enviar()" class="login-tarjeta__form">
      @if (error()) {
        <div class="login-tarjeta__error">{{ error() }}</div>
      }

      <div class="campo">
        <label class="campo__etiqueta" for="email">Correo electrónico</label>
        <input id="email" class="campo__entrada" type="email"
               formControlName="email" autocomplete="email"
               placeholder="admin@condominio.com" />
      </div>

      <div class="campo">
        <label class="campo__etiqueta" for="password">Contraseña</label>
        <input id="password" class="campo__entrada" type="password"
               formControlName="password" autocomplete="current-password"
               placeholder="••••••••" />
      </div>

      <button class="boton-primario login-tarjeta__btn"
              type="submit"
              [disabled]="cargando() || formulario.invalid">
        {{ cargando() ? 'Ingresando…' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
