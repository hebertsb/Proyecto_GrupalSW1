<div class="pantalla-completa">
  <app-cabecera>
    <span class="material-icons" style="vertical-align:middle;margin-right:6px">settings_input_component</span>
    Gestión de Cámaras
  </app-cabecera>

  <div class="pagina-contenido">
    <div class="pagina-toolbar">
      <button class="boton-primario" (click)="modalOpen.set(true)">
        <span class="material-icons">add</span> Nueva cámara
      </button>
    </div>

    @if (cargando()) {
      <p class="texto-2">Cargando…</p>
    } @else {
      <div class="tarjetas-grid">
        @for (cam of camaras(); track cam.camara_id) {
          <div class="tarjeta-camara">
            <div class="tarjeta-camara__cabeza">
              <span class="material-icons">{{ cam.is_active ? 'videocam' : 'videocam_off' }}</span>
              <span class="tarjeta-camara__nombre">{{ cam.nombre_ubicacion }}</span>
            </div>
            <p class="tarjeta-camara__url texto-2">{{ cam.rtsp_url }}</p>
            <div class="tarjeta-camara__acciones">
              <button class="boton-icono" (click)="alternarActiva(cam)"
                      [title]="cam.is_active ? 'Desactivar' : 'Activar'">
                <span class="material-icons">{{ cam.activa ? 'pause' : 'play_arrow' }}</span>
              </button>
              <button class="boton-icono texto-peligro" (click)="eliminar(cam.camara_id)" title="Eliminar">
                <span class="material-icons">delete</span>
              </button>
            </div>
          </div>
        }
      </div>
    }
  </div>

  <!-- Modal nueva cámara -->
  @if (modalOpen()) {
    <div class="modal-fondo" (click)="modalOpen.set(false)">
      <div class="modal" (click)="$event.stopPropagation()">
        <h2 class="modal__titulo">Nueva cámara</h2>

        <div class="campo">
          <label class="campo__etiqueta">Nombre / Ubicación</label>
          <input class="campo__entrada" [(ngModel)]="nueva.nombre_ubicacion" placeholder="Entrada principal — Puerta norte" />
        </div>
        <div class="campo">
          <label class="campo__etiqueta">URL RTSP / Stream</label>
          <input class="campo__entrada" [(ngModel)]="nueva.rtsp_url"
                 placeholder="http://192.168.1.x:8080/video  ó  rtsp://..." />
        </div>

        <div class="modal__acciones">
          <button class="boton-primario" (click)="guardar()">Guardar</button>
          <button class="boton-icono" (click)="modalOpen.set(false)">
            <span class="material-icons">close</span>
          </button>
        </div>
      </div>
    </div>
  }
</div>
